server {
    listen 80;
    listen [::]:80;
    
    # Reemplaza con tus dominios reales
    server_name garantis.mx www.garantis.mx;

    # Permitir peticiones ACME de Certbot (Let's Encrypt)
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/proyecto-garantis;
    }

    # Redirección y Reverse Proxy hacia Gunicorn (Flask)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ajustes de timeout recomendados para evitar errores 504 en llamadas largas
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
